<!doctype html>
<html>
  <head>
    <title>Machine Learning Algorithm Visualizer</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <h1>Machine Learning Algorithm Visualizer</h1>

    <form action="/result" method="POST">
      <h3>Select Algorithm</h3>

      <select name="algorithm">
        <option value="linear">Linear Regression</option>
        <option value="logistic">Logistic Regression</option>
      </select>

      <br /><br />

      <label>Enter X Values</label><br />

      <input type="text" name="xvalues" placeholder="Example: 1,2,3,4" />

      <br /><br />

      <label>Enter Y Values</label><br />

      <input type="text" name="yvalues" placeholder="Example: 2,3,5,4" />

      <br /><br />

      <button type="submit">Generate Result</button>
    </form>

    <br />

    <a href="/visualization">
      <button type="button">Visualization</button>
      <a href="/formula">
        <button type="button">Formula</button>
      </a>
    </a>
  </body>
</html>
